<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="올 인 원 자동자막 생성기 - AI 자동 자막 생성, 싱크 합치기, 무음 삭제를 무료로.">
<title>올 인 원 자동자막 생성기 — WaveSRT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--line:#222;--line2:#2e2e2e;--gold:#c8a96e;--gold2:#e8c98e;--white:#f0ede8;--gray:#888;--gray2:#444;--blue:#4a90d9;--green:#47c5a0;--red:#e84747}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 50%, rgba(20,20,20,0.5) 0%, rgba(10,10,10,1) 100%);pointer-events:none;z-index:-1}

/* 헤더 */
.site-header{padding:18px 32px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);z-index:50}
.site-logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:3px;color:var(--gold);text-decoration:none;font-weight:700}
.site-nav{display:flex;gap:24px}
.site-nav a{font-size:12px;color:var(--gray);text-decoration:none;letter-spacing:.5px;transition:color .2s}
.site-nav a:hover{color:var(--gold)}

/* 앱 섹션 */
.app-section{max-width:860px;margin:0 auto;padding:48px 24px; display:block !important;}
.app-notice{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.25);border-radius:12px;padding:16px 20px;margin-bottom:24px;font-size:13px;color:var(--gray);line-height:1.7}
.app-notice strong{color:var(--gold)}
.app-notice a{color:var(--gold)}

/* 워크플로우 그리드 */
.workflow-grid {display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px;}
.workflow-card {background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 16px; transition: border-color 0.3s;}
.workflow-card:hover {border-color: var(--gold2);}
.wf-step {font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); margin-bottom: 8px;}
.wf-title {font-weight: 600; font-size: 14px; margin-bottom: 6px;}
.wf-desc {font-size: 12px; color: var(--gray); line-height: 1.6;}
.wf-link {display: inline-block; margin-top: 8px; font-size: 11px; color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); cursor: pointer; background: none; border: none; padding: 0;}

/* 탭 */
.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:11px 12px;border:none;border-radius:9px;background:transparent;color:var(--gray);font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{background:var(--bg3);color:var(--gold);border:1px solid var(--line2)}
.panel{display:none;animation:fadeUp .3s ease both}
.panel.active{display:block}

/* 카드 */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:16px}
.card-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}
label.field-label{display:block;font-size:12px;color:var(--gray);margin-bottom:7px;font-weight:500}
input[type=number],select,textarea{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:9px;color:var(--white);font-family:'Pretendard',sans-serif;font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s}
textarea{resize:vertical;min-height:120px;line-height:1.6}

/* SRT 박스 */
.srt-box{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.srt-box-header{background:var(--bg3);padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gray);display:flex;align-items:center;justify-content:space-between}
.srt-box-header label{cursor:pointer;color:var(--blue);font-size:11px}
.srt-box-header input[type=file]{display:none}
.srt-textarea{border:none;border-radius:0;background:var(--bg);font-family:'DM Mono',monospace;font-size:12px;min-height:140px;padding:14px; width:100%; color:var(--white); outline:none}

/* 버튼 */
.btn{padding:13px 24px;border:none;border-radius:10px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--gold);color:#0a0a0a;width:100%;justify-content:center;font-size:15px}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--gray);border:1px solid var(--line)}
.btn-accent{background:rgba(71,197,160,.15);color:var(--green);border:1px solid rgba(71,197,160,.3)}

/* 결과 및 기타 */
.result-section{display:none;margin-top:16px}
.result-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.meta-chip{background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font
